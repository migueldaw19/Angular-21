<h1 class="text-3xl">Listado de Pokémons</h1>
<h2 class="text-xl">Página actual: {{currentPage ()}}</h2>

<hr class="my-2" />

<!-- Si el listado de pokemons ya se ha cargado muestra el listado, si no se ha cargado todavia 
 o ha fallado se queda el skeleton con la pantalla de carga-->
@if( pokemons().length !== 0 ) {
  <!--IMPORTANTE recuerda que las variables con signals llevan siempre () al final-->
<app-pokemon-list [pokemons]="pokemons()" />

} @else {

<app-pokemon-list-skeleton />
}

<!--Si fuera dinamico se vería así -->
<div class="flex justify-between">
  <button
    [disabled]="currentPage() === 1"
    [routerLink]="['/pokemons/page', currentPage()! - 1]"
    class="mt-2"
  >
    Anteriores
  </button>

  <button [routerLink]="['/pokemons/page', currentPage()! + 1]" class="mt-2">
    Siguientes
  </button>
